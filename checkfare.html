<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkfare | Nai's Transit</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #f4f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .fare-card {
        width: 90%;
        max-width: 500px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .fare-card h2 {
        text-align: center;
        color: #0f3d2e;
        margin-bottom: 20px;
    }

    #fareForm {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    #fareForm input {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    #fareForm button {
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #0f3d2e;
        color: white;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 18px;
        color: #0f3d2e;
    }

    .back-btn {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        color: #0f3d2e;
        font-weight: 600;
    }
</style>

<body>
    <div class="container">

        <div class="fare-card">

            <h2>Check Transport Fare</h2>

            <form id="fareForm">

                <input type="text" id="departure" placeholder="Departure">

                <input type="text" id="destination" placeholder="Destination">

                <button type="submit">
                    Check Fare
                </button>

            </form>

            <div id="result"></div>

            <a href="user-dashboard.html" class="back-btn">
                Back to Dashboard
            </a>

        </div>

    </div>
    <script>

        document.getElementById("fareForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                const departure =
                    document.getElementById("departure")
                        .value.trim()
                        .toLowerCase();

                const destination =
                    document.getElementById("destination")
                        .value.trim()
                        .toLowerCase();

                const fares =
                    JSON.parse(localStorage.getItem("fares")) || [];

                const fareFound = fares.find(fare => {

                    const route =
                        fare.route.toLowerCase();

                    return route.includes(departure)
                        && route.includes(destination);

                });

                const result =
                    document.getElementById("result");

                if (fareFound) {

                    result.innerHTML =
                        `Fare: ₦${fareFound.amount}`;

                } else {

                    result.innerHTML =
                        "Route not found";

                }

            });
    </script>
</body>

</html>
