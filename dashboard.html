<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Nai's Transit</title>
    <link rel="stylesheet" href="dash.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>

<body>
    <!-- SIDEBAR  -->
    <div class="sidebar">
        <h2>Nai's Transit</h2>
        <ul>
            <li class="active">Dashboard</li>
            <li>Routes</li>
            <li>Fares</li>
            <li>Vehicles</li>
            <li>Passengers</li>
            <li>Reports</li>
            <li>Settings</li>
        </ul>
        <a href="login.html" class="logout">Logout</a>
    </div>
    <!-- MAIN CONTENT  -->
    <div class="main">
        <!-- TOP BAR  -->
        <div class="topbar">
            <h3>Dashboard</h3>
            <div class="user">
                Admin
            </div>
        </div>
        <!-- STAT CARDS -->
        <div class="cards">
            <div class="card">
                <h4>Total Routes</h4>
                <p>12</p>
            </div>
            <div class="card">
                <h4>Total Vehicles</h4>
                <p>8</p>
            </div>
            <div class="card">
                <h4>Total Passengers</h4>
                <p>245</p>
            </div>
            <div class="card">
                <h4>Revenue</h4>
                <p>120,000</p>
            </div>
        </div>
        <!-- CONTENT SECTION  -->
        <div class="content">
            <div class="box">
                <h3>Revenue Chart</h3>
                <p>Chart will go here</p>
            </div>
            <div class="box">
                <h3>Recent Activities</h3>
                <p>No recent activity yet</p>
            </div>
        </div>
    </div>
</body>

</html>
