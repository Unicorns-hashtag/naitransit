<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes | Nai's Transit</title>
    <link rel="stylesheet" href="routes.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"> -->
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Nai's Transit</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="routes.html">Routes</a></li>
            <li><a href="fares.html">Fares</a></li>
            <li><a href="vehicles.html">Vehicles</a></li>
            <li><a href="passenger.html">Passengers</a></li>
            <li><a href="report.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
        <a href="login.html" class="logout">Logout</a>
    </div>
    <!-- MAIN  -->
    <div class="main">
        <div class="topbar">
            <h2>Route Management</h2>
        </div>
        <!-- ADD ROUTE FORM  -->
        <div class="form-box">
            <h3>Add New Route</h3>
            <form action="">
                <input type="text" placeholder="Route Name">
                <input type="text" placeholder="Departure">
                <input type="text" placeholder="Destination">
                <button type="submit">Add Route</button>
            </form>
        </div>
        <!-- ROUTE TABLE  -->
        <div class="table-box">
            <h3>Available Routes</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Route</th>
                        <th>Departure</th>
                        <th>Destination</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Ilaro Express</td>
                        <td>Ilaro</td>
                        <td>Abeokuta</td>
                        <td>
                            <button>Edit</button>
                            <button>Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Gateway Route</td>
                        <td>Abeokuta</td>
                        <td>Ota</td>
                        <td>
                            <button>Edit</button>
                            <button>Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
